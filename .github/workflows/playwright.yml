name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs:

  playwright-tests:
    name: Playwright Tests - Shard ${{ matrix.shard }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]


    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm


      - name: Install dependencies
        run: npm ci


      - name: Install Playwright Browsers
        run: npx playwright install --with-deps


      - name: Run Playwright Tests
        run: |
          npx playwright test \
          --shard=${{ matrix.shard }}/4


      - name: Verify Generated Reports
        if: always()
        run: |
          echo "Checking reports..."
          ls -la

          echo "Blob report:"
          ls -R blob-report || true

          echo "Allure results:"
          ls -R allure-results || true


      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          if-no-files-found: error
          retention-days: 7


      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.shard }}
          path: allure-results
          if-no-files-found: error
          retention-days: 7



  merge-reports:

    name: Merge Test Reports

    if: always()

    needs:
      - playwright-tests

    runs-on: ubuntu-latest


    steps:


      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm



      - name: Install dependencies
        run: npm ci



      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline



      - name: Download Blob Reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true



      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: all-allure-results
          merge-multiple: true



      - name: Create Final Report Folder
        run: |

          mkdir -p mergedReports/playwright-html
          mkdir -p mergedReports/allure-report
          mkdir -p mergedReports/test-results



      - name: Merge Playwright Reports
        run: |

          npx playwright merge-reports \
          --reporter html \
          ./all-blob-reports



      - name: Copy Playwright HTML Report
        run: |

          cp -r playwright-report/* \
          mergedReports/playwright-html/



      - name: Generate Allure Report
        run: |

          allure generate \
          all-allure-results \
          --clean \
          -o mergedReports/allure-report



      - name: Copy Additional Test Results
        run: |

          cp -r test-results/* \
          mergedReports/test-results/ || true



      - name: Create Execution Summary
        run: |

          echo "Playwright Automation Execution Report" \
          > mergedReports/execution-summary.txt

          echo "Generated Date: $(date)" \
          >> mergedReports/execution-summary.txt



      - name: Verify Final Reports
        run: |

          echo "Final Report Structure"

          ls -R mergedReports



      - name: Upload Final Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:

          name: merged-test-reports

          path: mergedReports

          retention-days: 30